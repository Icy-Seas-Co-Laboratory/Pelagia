[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pelagia"
version = "0.0.1"
description = "Integrated image processing, storage, API, CLI, and worker tools."
requires-python = ">=3.10"
dependencies = [
    "tomli; python_version < '3.11'",
    "thumbhash>=0.1.2",
]

[project.optional-dependencies]
api = ["fastapi", "uvicorn"]
cli = ["typer"]
postgres = ["psycopg[binary]"]
kvstore-blake3 = ["blake3"]
test = ["pytest"]

[project.scripts]
pelagia = "Pelagia.cli.app:main"

[tool.setuptools.packages.find]
include = ["Pelagia*"]

[tool.setuptools.package-data]
"Pelagia" = ["default.config.toml"]
"Pelagia.storage" = ["sql/*.sql"]

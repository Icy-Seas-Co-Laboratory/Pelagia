# Example worker stack for scripts/pelagia_stack_from_toml.sh.
# Run with:
#   ./scripts/pelagia_stack_from_toml.sh start scripts/pelagia_workers.example.toml

[stack]
name = "dev-workers"
# Options: auto, always, never.
init_on_start = "auto"

[database]
dsn = "postgresql://postgres:postgres@127.0.0.1:5432/pelagia"
schema = "pelagia"

[kvstore]
# Options: kvstore, kvstore2.
backend = "kvstore2"
root = "./data/kvstore"
# Used by kvstore2.
max_blob_bytes = 68_719_476_736

[file_browser]
# Server-side roots exposed by GET /live/files.
# Relative paths are resolved from the Pelagia repository root.
root_path_kvstore = "./data/kvstore"
root_path_import_dir = "./data/import"
allowed_root_paths = []

[processing.video_ingest]
n_tile = 4
# Ask OpenCV/FFmpeg to avoid hardware decode paths for formats like AV1.
prefer_software_decode = true

[api]
enabled = true
host = "127.0.0.1"
port = 8000
# Allows PelagiaView from localhost and common private LAN IP origins.
cors_allow_origin_regex = "https?://(localhost|127\\.0\\.0\\.1|\\[::1\\]|10(?:\\.\\d{1,3}){3}|100\\.(?:6[4-9]|[7-9]\\d|1[01]\\d|12[0-7])(?:\\.\\d{1,3}){2}|192\\.168(?:\\.\\d{1,3}){2}|172\\.(?:1[6-9]|2\\d|3[01])(?:\\.\\d{1,3}){2})(?::\\d+)?"

[worker_defaults]
idle_sleep_seconds = 2.0
requeue_interval_seconds = 30.0

[[worker]]
name = "ingest-1"
capabilities = ["ingest"]

[[worker]]
name = "preprocess-1"
capabilities = ["preprocess"]

[[worker]]
name = "background-1"
capabilities = ["background"]

[[worker]]
name = "segment-1"
capabilities = ["segment"]

[[worker]]
name = "refine-1"
capabilities = ["roi_refinement"]

[[worker]]
name = "allrounder"
capabilities = ["ingest", "background", "preprocess", "segment", "roi_refinement"]
enabled = false

# Example worker stack for scripts/pelagia_stack_from_toml.sh.
# Run with:
#   ./scripts/pelagia_stack_from_toml.sh start scripts/pelagia_workers.example.toml

[stack]
name = "dev-workers"
# Options: auto, always, never.
init_on_start = "auto"

[database]
dsn = "postgresql://postgres:postgres@127.0.0.1:5432/pelagia"
schema = "pelagia"

[kvstore]
# Options: kvstore, kvstore2.
backend = "kvstore2"
root = "./data/kvstore"
# Used by kvstore2.
max_blob_bytes = 68_719_476_736

[file_browser]
root_path_kvstore = "./data/kvstore"
root_path_import_dir = "./data/import"
allowed_root_paths = []

[api]
enabled = true
host = "0.0.0.0"
port = 8000
# Allows PelagiaView from localhost, common private LAN IP origins, and Pelagia Studio subdomains.
cors_allow_origin_regex = "https?://(localhost|127\\.0\\.0\\.1|\\[::1\\]|10(?:\\.\\d{1,3}){3}|100\\.(?:6[4-9]|[7-9]\\d|1[01]\\d|12[0-7])(?:\\.\\d{1,3}){2}|192\\.168(?:\\.\\d{1,3}){2}|172\\.(?:1[6-9]|2\\d|3[01])(?:\\.\\d{1,3}){2}|(?:[A-Za-z0-9-]+\\.)+pelagia\\.studio)(?::\\d+)?"

[worker_defaults]
idle_sleep_seconds = 2.0
requeue_interval_seconds = 30.0

[[worker]]
name = "fio-1"
capabilities = ["ingest", "background", "preprocess", "segment"]

[[worker]]
name = "fio-2"
capabilities = ["ingest", "background", "preprocess", "segment"]

[[worker]]
name = "fio-3"
capabilities = ["ingest", "background", "preprocess", "segment"]

[[worker]]
name = "fio-4"
capabilities = ["ingest", "background", "preprocess", "segment"]

[[worker]]
name = "fio-5"
capabilities = ["ingest", "background", "preprocess", "segment"]

[[worker]]
name = "fio-6"
capabilities = ["ingest", "background", "preprocess", "segment"]

[[worker]]
name = "cpu-1"
capabilities = ["segment"]

[[worker]]
name = "cpu-2"
capabilities = ["segment"]

[[worker]]
name = "cpu-3"
capabilities = ["segment"]

[[worker]]
name = "cpu-4"
capabilities = ["segment"]

[[worker]]
name = "cpu-5"
capabilities = ["segment"]

[[worker]]
name = "cpu-6"
capabilities = ["segment"]

[[worker]]
name = "gpu-1"
capabilities = ["roi_refinement"]

[[worker]]
name = "gpu-2"
capabilities = ["roi_refinement"]

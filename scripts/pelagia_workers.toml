# Example worker stack for scripts/pelagia_stack_from_toml.sh.
# Run with:
#   ./scripts/pelagia_stack_from_toml.sh start scripts/pelagia_workers.example.toml

[stack]
name = "dev-workers"
# Options: auto, always, never.
init_on_start = "auto"

[database]
dsn = "postgresql://postgres:postgres@127.0.0.1:5432/pelagia"
schema = "pelagia"

[kvstore]
root = "./data/kvstore"

[api]
enabled = true
host = "0.0.0.0"
port = 8000
# Allows PelagiaView from localhost and common private LAN IP origins.
cors_allow_origin_regex = "https?://(localhost|127\\.0\\.0\\.1|\\[::1\\]|10(?:\\.\\d{1,3}){3}|100\\.(?:6[4-9]|[7-9]\\d|1[01]\\d|12[0-7])(?:\\.\\d{1,3}){2}|192\\.168(?:\\.\\d{1,3}){2}|172\\.(?:1[6-9]|2\\d|3[01])(?:\\.\\d{1,3}){2})(?::\\d+)?"

[worker_defaults]
idle_sleep_seconds = 2.0
requeue_interval_seconds = 30.0

[[worker]]
name = "general-1"
capabilities = ["ingest", "background", "preprocess", "segment", "roi_refinement"]

[[worker]]
name = "general-2"
capabilities = ["ingest", "background", "preprocess", "segment", "roi_refinement"]

[[worker]]
name = "general-3"
capabilities = ["ingest", "background", "preprocess", "segment", "roi_refinement"]

[[worker]]
name = "general-4"
capabilities = ["ingest", "preprocess", "segment"]

[[worker]]
name = "general-5"
capabilities = ["ingest", "preprocess", "segment"]

[[worker]]
name = "general-6"
capabilities = ["ingest", "preprocess", "segment"]

[[worker]]
name = "general-7"
capabilities = ["ingest", "preprocess", "segment"]

[[worker]]
name = "general-8"
capabilities = ["ingest", "preprocess", "segment"]

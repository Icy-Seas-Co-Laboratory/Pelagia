# Packaged Pelagia defaults. Copy values into ./config.toml to override them
# for a local checkout. Environment variables and CLI flags still take
# precedence over these settings.

[database]
# PostgreSQL catalog and worker queue storage.
dsn = "postgresql://postgres:postgres@localhost:5432/pelagia"
schema_name = "pelagia"
connect_timeout_s = 5
statement_timeout_ms = 30000

[queue]
# Default job scheduling behavior. Lower priority values run first.
default_priority = 100
max_attempts = 3
max_claim_count = 1
lease_seconds = 300
heartbeat_interval_seconds = 30

[kvstore]
# Parent directory for named, project-scoped stores containing large frame payloads.
# Options: kvstore, kvstore2. Existing stores should keep kvstore unless migrated.
backend = "kvstore2"
directory = "./data/kvstores"
# Options: sha256, blake3.
hash_algorithm = "blake3"
# Number of hash-prefix characters used to shard object storage paths.
prefix_length = 2
# kvstore backend rotation controls.
max_db_bytes = 68_719_476_736
max_rows = 1000000
# kvstore2 blob-shard size limit.
max_blob_bytes = 68_719_476_736

[file_browser]
# Server-side roots exposed through /live/files for local file/folder selection.
# The file API cannot browse outside root_path_kvstore, root_path_import_dir,
# or explicitly listed allowed_root_paths.
root_path_kvstore = "./data/kvstores"
root_path_import_dir = "./data/import"
allowed_root_paths = []

[image_data_storage]
# Default image payload encoding. Options: zstd, png, jpg, jxl, jxs, raw.
encoding = "jpg"
# Default lossy image quality for jpg and jxl payloads.
quality = 90

[auth]
# Enable bearer-token authentication for API clients. Set false for single-user
# local development; requests then run as an admin-scoped dev session against
# dev_project_key instead of seeing all projects.
enabled = true
# Default session lifetime for login and project-switch tokens.
session_ttl_seconds = 604800
# Project used when auth.enabled=false. Configure this after creating a project.
dev_project_key = null
# Optional bootstrap credentials for scripted local setup.
bootstrap_admin_username = null
bootstrap_admin_password = null
bootstrap_admin_display_name = null

[processing.mask_augmentation]
# Binary-mask cleanup after thresholding and before candidate assembly.
enabled = false
# Ordered steps. Options: dilate, erode, open, close, fill_holes,
# remove_small_components, clear_border, none.
steps = ["dilate"]
dilate_kernel_w = 3
dilate_kernel_h = 3
dilate_iterations = 1
erode_kernel_w = 3
erode_kernel_h = 3
erode_iterations = 1
open_kernel_w = 3
open_kernel_h = 3
open_iterations = 1
close_kernel_w = 3
close_kernel_h = 3
close_iterations = 1
fill_holes = false
remove_small_components = false
min_component_area = 1
clear_border = false

[processing.roi_assembly]
# Candidate ROI assembly from the augmented mask.
# Options: connected_components, contours.
method = "connected_components"
connectivity = 8

[processing.roi_filter]
# Candidate ROI filters. Null disables a given criterion.
min_area = null
max_area = null
# Perimeter uses the candidate bounding-box perimeter.
min_perimeter = null
max_perimeter = null
min_width = 10
max_width = null
min_height = 10
max_height = null
# Width + height is often easier to reason about than box perimeter.
min_width_plus_height = null
max_width_plus_height = null

[processing.roi_recording]
# Stored candidate ROI payload and mask behavior.
padding = 50
# ROI and mask payload encoding. Options: zstd, png, jpg, jxl, raw, auto.
roi_encoding = "zstd"
# Minimum ROI byte size before auto encoding prefers zstd over png.
zstd_min_bytes = 8192
# Store masks for every retained candidate, even when ROI image bytes are skipped.
always_store_mask = true
# ROI image blobs are only stored when all non-null thresholds are satisfied.
store_roi_payload_min_area = null
store_roi_payload_min_width = 10
store_roi_payload_min_height = 10
store_roi_payload_min_width_plus_height = 50

[processing.video_ingest]
# Video-to-frame extraction defaults. Frame storage preserves extracted pixels;
# downstream processing steps own correction and segmentation transforms.
# Number of source video frames stacked into one stored frame/tile.
n_tile = 4
# Prefer CPU/software decode for reliability with codecs such as AV1 on systems
# where hardware acceleration is unavailable or misreported.
prefer_software_decode = true
# Limit OpenCV image operations within each ingest worker.
opencv_threads = 1
# Limit FFmpeg decoding in both VideoCapture and the CLI fallback.
decoder_threads = 1

[processing.flatfield]
# Flatfield correction defaults used during segmentation. Must be > 0 and < 1.
flatfield_correction = true
# Quantile used to estimate the flatfield profile.
flatfield_q = 0.5
# Axis used by global flatfield correction. Options: 0, 1.
flatfield_axis = 0
# Bound the estimated field before division: values below min become 0, values above max become 255.
flatfield_min_field_value = 25
flatfield_max_field_value = 255

[processing.thresholding]
# Candidate mask generation defaults.
#
# Method options:
# - manual: fixed grayscale threshold using manual_threshold.
# - otsu: Otsu automatic thresholding with optional maximum cap.
# - bounded_otsu: Otsu with minimum contrast and foreground-fraction safeguards.
# - bounded_otsu_canny: bounded_otsu with optional Canny edge support.
# - canny: standalone Canny edge detection.
# - adaptive_mean/adaptive_gaussian: local adaptive thresholding.
# - percentile_background: background percentile plus minimum contrast.
# - hysteresis: connected weak/strong thresholding.
# - sobel_edges: Sobel gradient thresholding.
method = "manual"

# Manual threshold method.
manual_threshold = 100

# Otsu-style methods.
# Maximum threshold value used when Otsu-style thresholding is capped.
thresholding_maximum_value = 100

# Bounded Otsu rejects weak foreground/background separation and overly full masks.
bounded_otsu_min_contrast = 50
bounded_otsu_max_foreground_fraction = 0.5

# Canny edge detection.
# Used by the standalone canny method and as optional support for bounded_otsu_canny.
canny_enabled = false
canny_low_threshold = 60
canny_high_threshold = 120
canny_blur_kernel = 5

# Adaptive threshold window size and constant offset.
adaptive_block_size = 31
adaptive_c = 5

# Percentile-background threshold estimates background brightness, then adds contrast.
percentile_background_percentile = 50
percentile_min_contrast = 50

# Hysteresis keeps weak pixels only when connected to strong pixels.
hysteresis_low_threshold = 30
hysteresis_high_threshold = 80
hysteresis_connectivity = 8

# Sobel edge thresholding uses a gradient percentile unless sobel_threshold is set.
sobel_percentile = 90
sobel_threshold = null
sobel_kernel_size = 3

[processing.preprocessing]
# Frame preprocessing defaults used before candidate detection.
# Processing order is: grayscale -> optional crop -> optional mask ->
# optional flatfield -> optional background correction -> optional inversion.
# Enable mask application when a frame mask is available or mask_path is set.
apply_mask = false
# Frame mask controls. Use null when no mask file is configured.
mask_path = null
# Future adaptive background-subtraction controls.
adaptive_background_subtraction = false
adaptive_background_period = 50
# Divide by a generated mean background field before inversion and thresholding.
background_correction = false
# Clamp the background field before division. Min must be > 0; max may be null.
background_min_field_value = 50
background_max_field_value = 255
# Convert dark-foreground imagery to Pelagia's bright-foreground convention.
invert_intensity = true
# Crop uses x/y origin plus width/height in source-frame pixels. Leave disabled
# or use null values when no default crop should be applied.
crop_enabled = false
crop_x = null
crop_y = null
crop_w = null
crop_h = null

[processing.frame_storage]
# Stored frame payload encoding. Options: zstd, png, jpg, jxl, jxs, raw.
image_encoding = "jpg"
# Stored frame lossy image quality for jpg and jxl payloads.
image_quality = 90

[processing.thumbhash]
# Maximum image dimension used before computing preview thumbhashes.
max_dim = 100

[processing.roi_refinement]
# Optional second-stage ROI mask refinement. The default identity model keeps
# candidate masks unchanged; oracle_builder_unet loads an oracle-builder run.
enabled = true
# Options: identity, keras_artifact, oracle_builder_unet.
model_kind = "keras_artifact"
# Registry reference for bundled/imported models. Used by artifact-backed refiners.
model_ref = "builtin:model/roi_refinement/example_model"
# Path to an oracle-builder run directory, for example ../oracle-builder/runs/unet-test.
model_run_dir = null
# Options: auto, keras, savedmodel.
model_artifact = "auto"
# Tile geometry should match the model input shape for learned refiners.
tile_size = 256
overlap_fraction = 0.25
max_iterations = 5
# Null uses tile stride as the expansion distance when a mask touches an edge.
expansion_pixels = 256
edge_touch_margin = 2
# Probability threshold used to convert model outputs into binary masks.
output_threshold = 0.5
# Tile prediction batch size. Null lets the model process all tiles for one ROI.
batch_size = null
# Null reuses candidate ROI encoding for refined records.
encoding = null
# Drop refined ROIs that substantially overlap a larger refined ROI on the same frame.
overlap_reconciliation_enabled = true
# Consume duplicate refined ROIs when mask IoU is at least this value.
overlap_iou_threshold = 0.5
# Consume duplicate refined ROIs when either mask is mostly contained by the other.
overlap_containment_threshold = 0.8
# Optionally discover additional valid targets left in the candidate mask after refinement.
residual_discovery_enabled = true
# Maximum recursive split generations to try.
residual_max_iterations = 1
# Null reuses the candidate's original assembly method when available.
residual_roi_assembly_method = null
# Connected-components connectivity for residual assembly. Options: 4, 8.
residual_roi_assembly_connectivity = 8
# Residual child filters. Null disables a given criterion.
residual_min_area = null
residual_min_width = null
residual_min_height = null
residual_min_width_plus_height = null
# Null reuses the parent candidate padding, bounded by the current ROI crop.
residual_padding = null

[api]
# FastAPI development server defaults.
host = "127.0.0.1"
port = 8000
# Browser origins allowed to call the API. Defaults allow localhost and
# common private LAN IPv4 origins, e.g. PelagiaView at http://192.168.x.y:5173.
cors_allow_origin_regex = "https?://(localhost|127\\.0\\.0\\.1|\\[::1\\]|10(?:\\.\\d{1,3}){3}|100\\.(?:6[4-9]|[7-9]\\d|1[01]\\d|12[0-7])(?:\\.\\d{1,3}){2}|192\\.168(?:\\.\\d{1,3}){2}|172\\.(?:1[6-9]|2\\d|3[01])(?:\\.\\d{1,3}){2})(?::\\d+)?"

[logging]
# Core operational logs. This layer must work even when PostgreSQL is down.
log_path = "./logs"
file_name = "pelagia.log"
# Options: DEBUG, INFO, WARNING, ERROR, CRITICAL.
level = "INFO"
console = true
max_bytes = 10485760
backup_count = 10

[artifacts]
# Local runtime library for imported models, plugin manifests, and future packs.
local_root = "./.pelagia"

[artifacts.models]
# Search packaged Pelagia/assets/models in addition to local_path.
builtin_enabled = true
# Local user/imported model manifests and payloads.
local_path = "./.pelagia/models"
metadata_filename = "metadata.toml"

[artifacts.plugins]
# Search packaged Pelagia/assets/plugins in addition to local_path.
builtin_enabled = true
# Local plugin manifests. Plugin execution/loading is intentionally future work.
local_path = "./.pelagia/plugins"
metadata_filename = "metadata.toml"
